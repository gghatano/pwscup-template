<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PWSCUP{% endblock %} - PWSCUP Contest</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #16a34a;
            --error: #dc2626;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        nav {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        nav a { color: white; text-decoration: none; opacity: 0.85; }
        nav a:hover { opacity: 1; }
        nav .brand { font-weight: bold; font-size: 1.2rem; opacity: 1; }
        .container { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card h2 { margin-bottom: 1rem; font-size: 1.25rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.6rem 0.8rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .btn:hover { background: var(--primary-dark); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 500; }
        .form-group select, .form-group input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.95rem;
        }
        .radio-group { display: flex; gap: 1.5rem; }
        .radio-group label { display: flex; align-items: center; gap: 0.4rem; font-weight: normal; }
        .tabs { display: flex; gap: 0; margin-bottom: 1rem; }
        .tab {
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--border);
            background: var(--bg);
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
        }
        .tab:first-child { border-radius: 6px 0 0 6px; }
        .tab:last-child { border-radius: 0 6px 6px 0; }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .score { font-weight: bold; }
        .score.good { color: var(--success); }
        .score.bad { color: var(--error); }
        .alert { padding: 1rem; border-radius: 6px; margin-bottom: 1rem; }
        .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .spinner { animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .text-muted { color: var(--text-muted); }
        .mt-1 { margin-top: 0.5rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="brand">PWSCUP Contest</a>
        <a href="/">Dashboard</a>
        <a href="/submit">Submit</a>
        <a href="/leaderboard">Leaderboard</a>
        <a href="/history">History</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
