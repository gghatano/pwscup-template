{% extends "base.html" %}
{% block title %}Submit & Evaluate{% endblock %}
{% block content %}
<h1>Submit & Evaluate</h1>

<div class="card">
    <h2>Run Evaluation</h2>
    <form hx-post="/submit/evaluate" hx-target="#eval-result" hx-indicator="#eval-spinner">
        <div class="form-group">
            <label>Division</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="division" value="anonymize" checked>
                    Anonymization
                </label>
                <label>
                    <input type="radio" name="division" value="reidentify">
                    Re-identification
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="algorithm_dir">Algorithm</label>
            <select name="algorithm_dir" id="algorithm_dir">
                {% for algo in algorithms %}
                <option value="{{ algo.path }}">{{ algo.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="team_id">Team</label>
            <select name="team_id" id="team_id">
                {% for team in teams %}
                <option value="{{ team.id }}">{{ team.name }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn">
            Run Evaluation
            <span id="eval-spinner" class="htmx-indicator spinner">&#9696;</span>
        </button>
    </form>
</div>

<div id="eval-result"></div>
{% endblock %}
