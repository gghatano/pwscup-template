{% if entries %}
<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Team</th>
            <th>Score</th>
            <th>Submissions</th>
        </tr>
    </thead>
    <tbody>
        {% for entry in entries %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ entry.team_name }}</td>
            <td class="score good">{{ "%.4f"|format(entry.best_score) }}</td>
            <td>{{ entry.count }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="text-muted">No submissions in this division yet.</p>
{% endif %}
