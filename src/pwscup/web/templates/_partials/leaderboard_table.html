{% if entries %}
<table>
    <thead>
        <tr>
            <th>順位</th>
            <th>チーム</th>
            <th>ベストスコア</th>
            <th>提出数</th>
        </tr>
    </thead>
    <tbody>
        {% for entry in entries %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ entry.team_name }}</td>
            <td class="score good">{{ "%.4f"|format(entry.best_score) }}</td>
            <td>{{ entry.count }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="text-muted">この部門にはまだ提出がありません。</p>
{% endif %}
