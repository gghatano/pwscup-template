contest:
  name: "PWSCUP データ匿名化・再識別コンテスト"

scoring:
  utility_weights:
    distribution_distance: 0.3
    correlation_preservation: 0.3
    query_accuracy: 0.2
    ml_utility: 0.2
  safety:
    s_auto_weight: 0.4
    s_reid_weight: 0.6
  total:
    anon_weight: 0.5
    reid_weight: 0.5
  metrics:
    utility:
      distribution_distance:
        enabled: true
        weight: 0.3
      correlation_preservation:
        enabled: true
        weight: 0.3
      query_accuracy:
        enabled: true
        weight: 0.2
      ml_utility:
        enabled: true
        weight: 0.2
      information_loss:
        enabled: false
        weight: 0.2
      range_coverage:
        enabled: false
        weight: 0.2
      outlier_preservation:
        enabled: false
        weight: 0.2
    safety:
      k_anonymity:
        enabled: true
        weight: 1.0
      l_diversity:
        enabled: true
        weight: 1.0
      t_closeness:
        enabled: true
        weight: 1.0
      record_linkage_risk:
        enabled: false
        weight: 1.0
      uniqueness_ratio:
        enabled: false
        weight: 1.0
      attribute_disclosure:
        enabled: false
        weight: 1.0
      delta_disclosure:
        enabled: false
        weight: 1.0
      beta_likeness:
        enabled: false
        weight: 1.0
      differential_privacy:
        enabled: false
        weight: 1.0
      skewness_attack:
        enabled: false
        weight: 1.0
    normalize_weights: true

constraints:
  min_k_anonymity: 2
  anonymize:
    time_limit_sec: 300
    memory_limit_mb: 4096
    cpu_cores: 2
  reidentify:
    time_limit_sec: 600
    memory_limit_mb: 4096
    cpu_cores: 2

submission:
  daily_limit: 5
  phase_limit_qualifying: 50
  phase_limit_final: 20
  final_selection: 2
